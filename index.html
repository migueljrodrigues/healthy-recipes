<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Healthy Recipes</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="stylesheet" href="css/styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
</head>
<body>
  <header class="hero">
    <div class="lang-toggle">
      <button class="lang-btn" data-lang="en">EN</button>
      <button class="lang-btn" data-lang="pt">PT</button>
    </div>
    <div class="hero-content">
      <h1>🥗 Healthy Recipes</h1>
      <p class="hero-subtitle">A curated collection of nutritious &amp; delicious recipes</p>
      <div class="search-container">
        <div class="search-box">
          <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input type="text" id="searchInput" placeholder="Search recipes, ingredients, tags..." autocomplete="off">
          <button id="clearSearch" class="clear-btn" title="Clear search" aria-label="Clear search">&times;</button>
        </div>
        <div class="search-stats" id="searchStats"></div>
      </div>
    </div>
  </header>

  <main>
    <section class="filters-bar">
      <div class="filters-row">
        <div class="filter-group">
          <label>Category</label>
          <div class="tag-filters" id="categoryFilters"></div>
        </div>
        <div class="filter-group">
          <label>Diet</label>
          <div class="tag-filters" id="dietFilters"></div>
        </div>
        <div class="filter-group">
          <label>Sort by</label>
          <select id="sortSelect">
            <option value="name-asc">Name (A → Z)</option>
            <option value="name-desc">Name (Z → A)</option>
            <option value="calories-asc">Calories (low → high)</option>
            <option value="calories-desc">Calories (high → low)</option>
            <option value="protein-desc">Protein (high → low)</option>
            <option value="prep-asc">Prep time (quick first)</option>
          </select>
        </div>
        <button id="resetFilters" class="reset-btn">Reset all</button>
      </div>
      <div class="active-filters" id="activeFilters"></div>
    </section>

    <section class="recipes-grid" id="recipesGrid"></section>

    <!-- Recipe Modal -->
    <div class="modal-overlay" id="modalOverlay">
      <div class="modal" id="recipeModal" role="dialog" aria-modal="true">
        <button class="modal-close" id="modalClose" aria-label="Close">&times;</button>
        <div class="modal-body" id="modalBody"></div>
      </div>
    </div>
  </main>

  <footer>
    <p><a href="https://github.com/migueljrodrigues/healthy-recipes" target="_blank" rel="noopener noreferrer">GitHub</a> | v1.1.2</p>
  </footer>

  <script src="js/recipes.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
